                                React.createElement('div', { className: 'text-4xl mb-4' }, '✓'),
                                React.createElement('h3', { className: 'text-xl font-bold text-gray-900 mb-2' }, 'Thank You!'),
                                React.createElement('p', { className: 'text-gray-600' }, 'We\'ll contact you within 2 hours.')
                            )
                        )
                    )
                ),

                // WhatsApp Floating Button
                React.createElement('button', {
                    onClick: handleWhatsAppClick,
                    className: 'fixed bottom-6 right-6 bg-green-500 text-white p-4 rounded-full shadow-lg hover:bg-green-600 transition hover:scale-110 z-30 text-2xl',
                    title: 'Chat on WhatsApp'
                }, '💬')
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(ConsultancyWebsite));
    </script>
